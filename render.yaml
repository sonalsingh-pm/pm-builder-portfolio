# Render blueprint — deploys the Compass backend as a free web service.
# Secrets are entered in the Render dashboard (sync: false), never stored here.
services:
  - type: web
    name: compass-backend
    runtime: python
    plan: free
    rootDir: projects/compass/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
